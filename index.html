<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>67 counter</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #app-container {
            width: 100vw;
            height: 100vh;
            max-width: none;
            max-height: none;
            position: relative;
            background: #000;
            overflow: hidden;
            border-radius: 0; 
        }

        #start-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: rgba(0,0,0,0.8);
            padding: 20px;
        }
        .time-btn-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 600px;
        }
        .time-btn {
            background: white;
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 160px;
            transition: 0.2s;
        }
        .time-btn:hover { background: #ddd; }

        #game-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: none;
            background-color: #000;
        }
        
        #input-video { display: none; }

        #end-screen {
            position: absolute;
            inset: 0;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            z-index: 20;
        }
        .top-nav {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #888;
            font-size: 16px;
            cursor: pointer;
        }
        .end-title { font-size: 22px; color: #fff; margin-bottom: 20px; font-weight: 500;}
        .end-label { font-size: 12px; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-top: 20px;}
        .end-player { font-size: 24px; color: #fff; margin: 5px 0 30px 0; font-weight: 500;}
        .end-score { font-size: 100px; color: #ff3b30; font-weight: bold; line-height: 1; margin: 5px 0;}
        .end-reps { font-size: 16px; color: #888; margin-bottom: 40px;}
        .play-again {
            background: white; color: black; font-size: 18px; font-weight: bold;
            border: none; border-radius: 30px; padding: 15px 40px; cursor: pointer;
            width: 80%; max-width: 300px; margin-bottom: 20px;
        }
        .bottom-ui {
            width: 90%;
            max-width: 400px;
            display: flex;
            background: #111;
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 20px;
        }
        .bottom-ui div {
            flex: 1; text-align: center; padding: 12px; border-radius: 12px; font-size: 14px;
        }
        .bottom-ui .active { background: #222; color: white; }
        .bottom-ui .inactive { color: #888; }
        
        #download-btn {
            color: #4ade80; text-decoration: none; font-weight: bold; cursor: pointer; margin-bottom: auto; font-size: 18px; padding: 10px 20px; border: 2px solid #4ade80; border-radius: 8px;
        }
        #download-btn:hover { background-color: #4ade80; color: #000; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="start-screen">
            <h2 style="margin-bottom: 30px; font-size: 32px;">Select Timer</h2>
            <div class="time-btn-container">
                <button class="time-btn" onclick="initiateStartSequence(20)">20 Seconds</button>
                <button class="time-btn" onclick="initiateStartSequence(60)">1 Minute</button>
                <button class="time-btn" onclick="initiateStartSequence(120)">2 Minutes</button>
                <button class="time-btn" onclick="initiateStartSequence(180)">3 Minutes</button>
                <button class="time-btn" onclick="initiateStartSequence(240)">4 Minutes</button>
                <button class="time-btn" onclick="initiateStartSequence(300)">5 Minutes</button>
            </div>
        </div>

        <video id="input-video" autoplay playsinline></video>
        <canvas id="game-canvas"></canvas>

        <div id="end-screen">
            <div class="top-nav" onclick="location.reload()">← Return Home</div>
            <div class="end-title">Game Complete</div>
            
            <div class="end-label">PLAYER</div>
            <div class="end-player">You</div>
            
            <div class="end-label">FINAL SCORE</div>
            <div class="end-score" id="final-score-display">0</div>
            <div class="end-reps">repetitions</div>
            
            <button class="play-again" onclick="location.reload()">Play Again</button>

            <a id="download-btn" download="my-score.webm">Save Video</a>

            <div class="bottom-ui">
                <div class="active">All Scores</div>
                <div class="inactive">Lifetime</div>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input-video');
        const canvasElement = document.getElementById('game-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const endScreen = document.getElementById('end-screen');
        const scoreDisplay = document.getElementById('final-score-display');
        const downloadBtn = document.getElementById('download-btn');

        let isPreStarting = false;
        let isPlaying = false;
        let preStartCount = 3;
        
        let repCount = 0;
        let timeLeft = 0;
        let selectedDuration = 0;
        let countdownInterval;
        
        let handTrackers = {}; 

        let mediaRecorder;
        let recordedChunks = [];
        let camera;

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        hands.setOptions({
            maxNumHands: 2, 
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (!isPreStarting && !isPlaying) return;

            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // --- NEW: MIRROR THE VIDEO ---
            canvasCtx.save(); // Save the clean context
            // Flip the canvas horizontally
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);
            // Draw the video mirrored
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.restore(); // Restore back so text isn't drawn backwards!

            // 1. PRE-START COUNTDOWN MODE (3... 2... 1...)
            if (isPreStarting) {
                canvasCtx.font = 'bold 120px Arial';
                canvasCtx.fillStyle = 'white';
                canvasCtx.textAlign = 'center';
                
                canvasCtx.shadowColor = "rgba(0,0,0,0.7)";
                canvasCtx.shadowBlur = 15;
                
                let text = preStartCount > 0 ? preStartCount : "GO!";
                canvasCtx.fillText(text, canvasElement.width / 2, canvasElement.height / 2 + 40);
                canvasCtx.shadowBlur = 0; 
            }

            // 2. ACTUAL GAME MODE
            if (isPlaying) {
                if (results.multiHandLandmarks) {
                    results.multiHandLandmarks.forEach((landmarks, index) => {
                        const palm = landmarks[9]; 
                        
                        if (!handTrackers[index]) {
                            handTrackers[index] = { lastY: palm.y, direction: 'down' };
                        }

                        const tracker = handTrackers[index];
                        const deltaY = palm.y - tracker.lastY;

                        if (deltaY < -0.015 && tracker.direction === 'down') {
                            tracker.direction = 'up';
                        } 
                        else if (deltaY > 0.015 && tracker.direction === 'up') {
                            tracker.direction = 'down';
                            repCount++;
                        }
                        tracker.lastY = palm.y;

                        // --- NEW: MIRROR THE RED DOTS ---
                        // Because we flipped the video, we have to flip the X coordinate of the dot (1 - palm.x)
                        const xPx = (1 - palm.x) * canvasElement.width;
                        const yPx = palm.y * canvasElement.height;
                        
                        canvasCtx.beginPath();
                        canvasCtx.arc(xPx, yPx, 25, 0, 2 * Math.PI);
                        canvasCtx.fillStyle = '#ff3b30';
                        canvasCtx.fill();
                    });
                }

                // Draw Top Timer
                canvasCtx.font = 'bold 100px Arial';
                canvasCtx.fillStyle = '#ff3b30';
                canvasCtx.textAlign = 'center';
                canvasCtx.fillText(timeLeft, canvasElement.width / 2, 120);

                // Draw "REPS" label
                canvasCtx.font = 'bold 24px Arial';
                canvasCtx.fillStyle = 'white';
                canvasCtx.fillText('REPS', canvasElement.width / 2, canvasElement.height / 2 - 80);

                // Draw Score
                canvasCtx.font = 'bold 160px Arial';
                canvasCtx.shadowColor = "rgba(0,0,0,0.5)";
                canvasCtx.shadowBlur = 10;
                canvasCtx.fillText(repCount, canvasElement.width / 2, canvasElement.height / 2 + 50);
                canvasCtx.shadowBlur = 0;
            }

            // 3. DRAW WARNING TEXT
            canvasCtx.font = '24px Arial';
            canvasCtx.textAlign = 'center';
            
            canvasCtx.shadowColor = "rgba(0,0,0,0.8)";
            canvasCtx.shadowBlur = 8;
            canvasCtx.fillStyle = 'white';
            
            canvasCtx.fillText('Hands must stay in frame', canvasElement.width / 2, canvasElement.height - 80);
            
            canvasCtx.shadowBlur = 0;

            canvasCtx.restore();
        });

        async function initiateStartSequence(seconds) {
            selectedDuration = seconds;
            preStartCount = 3;
            repCount = 0;
            handTrackers = {};
            recordedChunks = [];
            
            startScreen.style.display = 'none';
            canvasElement.style.display = 'block';

            camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({image: videoElement});
                },
                width: 1280,
                height: 720
            });
            await camera.start();

            isPreStarting = true;

            let preTimerInterval = setInterval(() => {
                preStartCount--;
                if (preStartCount < 0) {
                    clearInterval(preTimerInterval);
                    isPreStarting = false;
                    beginActualGame();
                }
            }, 1000);
        }

        function beginActualGame() {
            timeLeft = selectedDuration;
            isPlaying = true;

            const canvasStream = canvasElement.captureStream(30); 
            mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) recordedChunks.push(event.data);
            };
            mediaRecorder.onstop = handleRecordingStop;
            mediaRecorder.start();

            countdownInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(countdownInterval);
            
            if (mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            if (camera) {
                camera.stop();
            }

            canvasElement.style.display = 'none';
            endScreen.style.display = 'flex';
            scoreDisplay.innerText = repCount;
        }

        function handleRecordingStop() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const videoURL = URL.createObjectURL(blob);
            
            downloadBtn.href = videoURL;
            downloadBtn.style.display = 'block';
        }
    </script>
</body>
</html>
